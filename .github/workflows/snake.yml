name: Generate Datas

on:
  schedule: # Jalankan otomatis setiap 12 jam
    - cron: "0 */12 * * *"
  
  # Memungkinkan kamu menjalankan action ini secara manual dari tab Actions
  workflow_dispatch:
  
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Generate animasi ular dari kotak kontribusi GitHub (activity graph)
      - uses: Platane/snk@v3
        with:
          # username GitHub-mu untuk membaca data kontribusi
          github_user_name: jettt017
          
          # output animasi akan di-generate ke file ini
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9
            
      # Push hasil gambar animasi ke branch bernama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
